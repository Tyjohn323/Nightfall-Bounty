  <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nightfall Support Page</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      color: #222;
    }

    .header {
      background: linear-gradient(90deg, #1e1e2f, #2b2b45);
      color: white;
      padding: 30px;
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: #555;
    }

    .title h1 {
      margin: 0;
      font-size: 2rem;
    }

    .container {
      display: flex;
      gap: 20px;
      padding: 20px;
      flex-wrap: wrap;
    }

    .card {
      background: white;
      border-radius: 15px;
      padding: 20px;
      flex: 1;
      min-width: 300px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    .progress {
      background: #ddd;
      border-radius: 10px;
      overflow: hidden;
      margin: 10px 0;
    }

    .progress-bar {
      height: 15px;
      width: 0%;
      background: #4caf50;
      transition: width 0.5s;
    }

    .donate-option {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 10px 0;
      padding: 10px;
      border-radius: 10px;
      background: #f1f1f1;
    }

    .button {
      background: #4a6cf7;
      color: white;
      padding: 10px 15px;
      border-radius: 8px;
      text-decoration: none;
    }

    .button:hover {
      background: #6c8cff;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="avatar"></div>
    <div class="title">
      <h1>Nightfall</h1>
      <p>Verify Nightfall and win the robux</p>
    </div>
  </div>

  <div class="container">

    <div class="card">
      <h2>Verify Nightfall and you get:</h2>
      <p><strong>Goal:</strong> 10,000 Robux</p>

      <div class="progress">
        <div class="progress-bar" id="progressBar"></div>
      </div>

      <p id="progressText">0 / 10,000 Robux</p>
    </div>

    <div class="card">
      <h2>Donate</h2>

      <div class="donate-option">
        <span>💎 5 Robux</span>
        <a class="button" href="https://www.roblox.com/game-pass/245516277/A-5-Robux-Donation-To-The-Verifier" target="_blank">Donate</a>
      </div>

      <div class="donate-option">
        <span>💰 50 Robux</span>
        <a class="button" href="https://www.roblox.com/game-pass/866774220/50-Robux-Donation-To-The-Verifier" target="_blank">Donate</a>
      </div>

      <div class="donate-option">
        <span>🔥 100 Robux</span>
        <a class="button" href="https://www.roblox.com/game-pass/72146841/100-Robux-Donation-To-The-Verifier" target="_blank">Donate</a>
      </div>

      <div class="donate-option">
        <span>👑 500 Robux</span>
        <a class="button" href="https://www.roblox.com/game-pass/120092581/500-Robux-Donation-To-The-Verifier" target="_blank">Donate</a>
      </div>

      <div class="donate-option">
        <span>🚀 1000 Robux</span>
        <a class="button" href="https://www.roblox.com/game-pass/1169641788/1000-Robux-Donation-To-The-Verifier" target="_blank">Donate</a>
      </div>

    </div>

  </div>

  <script>
    // CHANGE THIS NUMBER TO UPDATE YOUR PROGRESS
    let currentRobux = 1000;
    let goal = 10000;

    let percent = (currentRobux / goal) * 100;

    document.getElementById("progressBar").style.width = percent + "%";
    document.getElementById("progressText").innerText = currentRobux + " / " + goal + " Robux";
  </script>

</body>
</html>
    
  </body>
  
</html>
